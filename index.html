<!-- ======================================== -->
<!-- FILE: index.html -->
<!-- ======================================== -->

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SH CRM</title>
    
    <!-- Базовый путь для GitHub Pages -->
    <base href="/second-hand-crm/">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SH CRM">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f1f5f9;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .splash-screen {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 6px -2px rgba(0, 0, 0, 0.08);
            max-width: 440px;
            width: 90%;
            border: 1px solid #e2e8f0;
        }
        
        .splash-logo {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        .splash-title {
            font-size: 24px;
            font-weight: 600;
            color: #0f172a;
            margin-bottom: 8px;
        }
        
        .splash-subtitle {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 32px;
        }
        
        .loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e2e8f0;
            border-top-color: #2563eb;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loader-text {
            font-size: 14px;
            color: #475569;
        }
        
        .error-message {
            display: none;
            margin-top: 24px;
            padding: 16px;
            background: #fef2f2;
            border-radius: 8px;
            border-left: 3px solid #dc2626;
            text-align: left;
        }
        
        .error-message.show {
            display: block;
        }
        
        .error-title {
            font-weight: 600;
            color: #991b1b;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .error-text {
            font-size: 13px;
            color: #7f1d1d;
            margin-bottom: 12px;
            line-height: 1.5;
            word-break: break-word;
        }
        
        .error-details {
            font-size: 12px;
            color: #991b1b;
            margin-bottom: 16px;
            padding: 8px;
            background: rgba(0, 0, 0, 0.04);
            border-radius: 4px;
            font-family: 'SF Mono', 'Monaco', 'Inconsolata', monospace;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 100px;
            overflow-y: auto;
        }
        
        .error-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .btn {
            display: inline-block;
            padding: 8px 16px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            color: #475569;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.15s;
            white-space: nowrap;
        }
        
        .btn:hover {
            background: #f8fafc;
            border-color: #cbd5e1;
        }
        
        .btn-primary {
            background: #2563eb;
            color: white;
            border-color: #1d4ed8;
        }
        
        .btn-primary:hover {
            background: #1d4ed8;
        }
        
        .btn-danger {
            background: #dc2626;
            color: white;
            border-color: #b91c1c;
        }
        
        .btn-danger:hover {
            background: #b91c1c;
        }
    </style>
</head>
<body>
    <div class="splash-screen" id="splashScreen">
        <div class="splash-logo">🛍️</div>
        <div class="splash-title">SH CRM</div>
        <div class="splash-subtitle">Комиссионный магазин</div>
        
        <div class="loader" id="splashLoader">
            <div class="spinner"></div>
            <div class="loader-text">Проверка сессии...</div>
        </div>
        
        <div class="error-message" id="splashError">
            <div class="error-title" id="errorTitle">⚠️ Ошибка</div>
            <div class="error-text" id="errorMessage">Не удалось загрузить приложение</div>
            <div class="error-details" id="errorDetails" style="display: none;"></div>
            <div class="error-actions">
                <a href="pages/login.html" class="btn btn-primary" id="loginBtn">Перейти ко входу</a>
                <button class="btn" id="retryBtn">Повторить</button>
            </div>
        </div>
    </div>

    <script>
        /**
         * Регистрация Service Worker для PWA
         */
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js', { scope: '/' })
                    .then(registration => {
                        console.log('[PWA] ServiceWorker registered with scope:', registration.scope);
                        
                        // Проверяем обновления каждые 60 минут
                        setInterval(() => {
                            registration.update();
                        }, 60 * 60 * 1000);
                    })
                    .catch(error => {
                        console.warn('[PWA] ServiceWorker registration failed:', error);
                    });
            });
        }
        
        /**
         * Инициализация приложения.
         * Проверяет сессию и перенаправляет на нужную страницу.
         */
        async function init() {
            const loaderText = document.querySelector('#splashLoader .loader-text');
            
            try {
                // Шаг 1: Проверяем сеть
                if (!navigator.onLine) {
                    throw new Error('NETWORK_OFFLINE');
                }
                
                // Шаг 2: Пытаемся загрузить модуль auth
                loaderText.textContent = 'Загрузка модуля авторизации...';
                
                let authModule;
                try {
                    authModule = await import('./core/auth.js');
                } catch (importError) {
                    console.error('[Index] Failed to import auth.js:', importError);
                    throw new Error('MODULE_LOAD_FAILED: ' + (importError.message || 'Неизвестная ошибка импорта'));
                }
                
                const { getCurrentUser } = authModule;
                
                if (typeof getCurrentUser !== 'function') {
                    throw new Error('MODULE_API_ERROR: getCurrentUser не найдена в auth.js');
                }
                
                // Шаг 3: Проверяем сессию
                loaderText.textContent = 'Проверка сессии...';
                
                const { user, error, errorType } = await getCurrentUser();
                
                if (error) {
                    if (errorType === 'network') {
                        throw new Error('SUPABASE_NETWORK_ERROR: ' + error);
                    } else if (errorType === 'auth') {
                        // Нет сессии — это нормально, перенаправляем на вход
                        console.log('[Index] No session found, redirecting to login');
                        window.location.href = 'pages/login.html';
                        return;
                    } else {
                        throw new Error('SUPABASE_UNKNOWN_ERROR: ' + error);
                    }
                }
                
                if (user) {
                    // Сессия есть — перенаправляем на склад
                    console.log('[Index] Session found, redirecting to inventory');
                    window.location.href = 'pages/inventory.html';
                } else {
                    // Нет пользователя — на вход
                    window.location.href = 'pages/login.html';
                }
                
            } catch (err) {
                console.error('[Index] Init error:', err);
                handleInitError(err);
            }
        }
        
        /**
         * Обрабатывает ошибку инициализации и показывает пользователю
         * @param {Error} err - Объект ошибки
         */
        function handleInitError(err) {
            const splashLoader = document.getElementById('splashLoader');
            const splashError = document.getElementById('splashError');
            const errorTitle = document.getElementById('errorTitle');
            const errorMessage = document.getElementById('errorMessage');
            const errorDetails = document.getElementById('errorDetails');
            
            // Скрываем лоадер
            if (splashLoader) {
                splashLoader.style.display = 'none';
            }
            
            // Показываем ошибку
            if (splashError) {
                splashError.classList.add('show');
            }
            
            const errorMsg = err.message || String(err);
            
            // Определяем тип ошибки и показываем понятное сообщение
            if (errorMsg.includes('NETWORK_OFFLINE')) {
                if (errorTitle) errorTitle.textContent = '⚠️ Нет подключения к интернету';
                if (errorMessage) errorMessage.textContent = 'Приложение требует подключения к интернету для первой загрузки. Проверьте соединение и попробуйте снова.';
            } else if (errorMsg.includes('MODULE_LOAD_FAILED')) {
                if (errorTitle) errorTitle.textContent = '⚠️ Ошибка загрузки модуля';
                if (errorMessage) errorMessage.textContent = 'Не удалось загрузить основной модуль авторизации. Возможно, файл повреждён или отсутствует. Попробуйте обновить страницу.';
            } else if (errorMsg.includes('SUPABASE_NETWORK_ERROR')) {
                if (errorTitle) errorTitle.textContent = '⚠️ Сервер недоступен';
                if (errorMessage) errorMessage.textContent = 'Не удалось подключиться к серверу авторизации. Проверьте подключение к интернету и попробуйте снова.';
            } else if (errorMsg.includes('MODULE_API_ERROR')) {
                if (errorTitle) errorTitle.textContent = '⚠️ Ошибка API модуля';
                if (errorMessage) errorMessage.textContent = 'Нарушена структура модуля авторизации. Возможно, требуется обновление приложения.';
            } else {
                if (errorTitle) errorTitle.textContent = '⚠️ Неизвестная ошибка';
                if (errorMessage) errorMessage.textContent = 'Произошла непредвиденная ошибка при загрузке приложения.';
            }
            
            // Показываем технические детали (для отладки)
            if (errorDetails) {
                errorDetails.style.display = 'block';
                errorDetails.textContent = errorMsg;
            }
            
            // Кнопка "Войти" всегда доступна как fallback
            const loginBtn = document.getElementById('loginBtn');
            if (loginBtn) {
                loginBtn.style.display = 'inline-block';
            }
        }
        
        // Обработчики кнопок
        document.getElementById('retryBtn')?.addEventListener('click', () => {
            const splashError = document.getElementById('splashError');
            const splashLoader = document.getElementById('splashLoader');
            
            if (splashError) splashError.classList.remove('show');
            if (splashLoader) splashLoader.style.display = 'flex';
            
            init();
        });
        
        document.getElementById('loginBtn')?.addEventListener('click', (e) => {
            // Уже является ссылкой на pages/login.html
            // Не отменяем переход
        });
        
        // Запуск
        init();
        
        // Fallback таймаут (10 секунд)
        setTimeout(() => {
            const loader = document.getElementById('splashLoader');
            if (loader && loader.style.display !== 'none') {
                const error = new Error('TIMEOUT: Превышено время ожидания ответа от сервера');
                handleInitError(error);
            }
        }, 10000);
    </script>
</body>
</html>
