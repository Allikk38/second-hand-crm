<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SH CRM</title>
    
    <style>
        /* ... стили как раньше ... */
    </style>
</head>
<body>
    <div class="splash-screen" id="splashScreen">
        <!-- ... содержимое как раньше ... -->
    </div>

    <!-- CDN УДАЛЁН — загружается через auth.js -->
    
    <script>
        // Конфигурация Supabase (синхронизирована с core/auth.js)
        const SUPABASE_URL = 'https://bhdwniiyrrujeoubrvle.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_EZ_RGBwpdbz9O2N8hX_wXw_NjbslvTP';
        
        // Функция для динамической загрузки auth.js и проверки сессии
        async function init() {
            try {
                // Динамически импортируем auth.js
                const authModule = await import('./core/auth.js');
                const { getCurrentUser } = authModule;
                
                const { user, error } = await getCurrentUser();
                
                if (error || !user) {
                    window.location.href = 'pages/login.html';
                } else {
                    window.location.href = 'pages/inventory.html';
                }
            } catch (err) {
                console.error('[Index] Init error:', err);
                document.getElementById('splashLoader').style.display = 'none';
                document.getElementById('splashError').classList.add('show');
                document.getElementById('errorMessage').textContent = 'Ошибка загрузки приложения';
            }
        }
        
        // Обработчики кнопок
        document.getElementById('retryBtn')?.addEventListener('click', () => {
            document.getElementById('splashError').classList.remove('show');
            document.getElementById('splashLoader').style.display = 'flex';
            init();
        });
        
        document.getElementById('loginBtn')?.addEventListener('click', () => {
            window.location.href = 'pages/login.html';
        });
        
        // Запуск
        init();
        
        // Fallback таймаут
        setTimeout(() => {
            const loader = document.getElementById('splashLoader');
            if (loader && loader.style.display !== 'none') {
                loader.style.display = 'none';
                document.getElementById('splashError').classList.add('show');
                document.getElementById('errorMessage').textContent = 'Превышено время ожидания';
            }
        }, 8000);
    </script>
</body>
</html>
