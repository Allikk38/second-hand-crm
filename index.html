<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    
    <!-- PWA / Мобильные мета-теги -->
    <meta name="theme-color" content="#0f172a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SH CRM 2.0">
    <meta name="format-detection" content="telephone=no">
    
    <!-- SEO -->
    <meta name="description" content="Second Hand CRM 2.0 — Профессиональная система управления магазином. Модульная архитектура с изолированными виджетами.">
    <meta name="robots" content="noindex, nofollow">
    
    <title>SH CRM 2.0 — Склад, Касса, Отчеты</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230f172a'/%3E%3Ctext x='50' y='70' font-size='50' text-anchor='middle' fill='white' font-family='Arial' font-weight='bold'%3ESH%3C/text%3E%3C/svg%3E">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230f172a'/%3E%3Ctext x='50' y='70' font-size='50' text-anchor='middle' fill='white' font-family='Arial' font-weight='bold'%3ESH%3C/text%3E%3C/svg%3E">
    
    <!-- Предзагрузка внешних ресурсов -->
    <link rel="preconnect" href="https://bhdwniiyrrujeoubrvle.supabase.co">
    <link rel="preconnect" href="https://esm.sh">
    <link rel="dns-prefetch" href="https://bhdwniiyrrujeoubrvle.supabase.co">
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
    
    <!-- Подключаем старые стили (пока оставляем для совместимости) -->
    <link rel="stylesheet" href="css/styles.css">
    
    <!-- Критические стили для мгновенной отрисовки -->
    <style>
        /* ========== БАЗОВЫЙ РЕСЕТ ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, sans-serif;
            background: #f1f5f9;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        #app-root {
            height: 100%;
            width: 100%;
        }
        
        /* ========== НАЧАЛЬНЫЙ ЛОАДЕР ========== */
        .app-initial-loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 20px;
            color: #64748b;
            background: #f1f5f9;
            transition: opacity 0.3s ease-out;
        }
        
        .loader-logo {
            font-size: 32px;
            font-weight: 700;
            color: #0f172a;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }
        
        .loader-spinner-large {
            width: 48px;
            height: 48px;
            border: 3px solid #e2e8f0;
            border-top-color: #0f172a;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loader-text {
            font-size: 15px;
            font-weight: 500;
        }
        
        .loader-subtext {
            font-size: 13px;
            opacity: 0.6;
        }
        
        /* ========== ОБОЛОЧКА ПРИЛОЖЕНИЯ ========== */
        .app-shell {
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #f1f5f9;
        }
        
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            height: 56px;
            background: white;
            border-bottom: 1px solid #e2e8f0;
            flex-shrink: 0;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .app-header h1 {
            font-size: 18px;
            font-weight: 600;
            color: #0f172a;
        }
        
        .version-badge {
            padding: 2px 8px;
            background: #e2e8f0;
            color: #475569;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
        }
        
        .app-nav {
            display: flex;
            gap: 4px;
        }
        
        .app-nav button {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: transparent;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            color: #64748b;
            cursor: pointer;
            transition: background 0.15s;
        }
        
        .app-nav button:hover {
            background: #f1f5f9;
            color: #0f172a;
        }
        
        .app-nav button.active {
            background: #0f172a;
            color: white;
        }
        
        .header-right {
            display: flex;
            align-items: center;
        }
        
        .app-main {
            flex: 1;
            min-height: 0;
            overflow: auto;
            padding: 20px;
        }
        
        /* ========== СООБЩЕНИЕ ТРЕБОВАНИЯ АВТОРИЗАЦИИ ========== */
        .auth-required-message {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            min-height: 400px;
            text-align: center;
            color: #64748b;
        }
        
        .auth-required-icon {
            font-size: 64px;
            margin-bottom: 24px;
            opacity: 0.5;
        }
        
        .auth-required-message h2 {
            font-size: 24px;
            font-weight: 600;
            color: #0f172a;
            margin-bottom: 8px;
        }
        
        .auth-required-message p {
            font-size: 15px;
        }
        
        .auth-required-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            color: #64748b;
        }
        
        /* ========== ЛОАДЕР ВИДЖЕТА ========== */
        .widget-loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            color: #6b7280;
        }
        
        .loader-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e5e7eb;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }
        
        .loader-spinner.small {
            width: 20px;
            height: 20px;
            border-width: 2px;
        }
        
        /* ========== ОШИБКА ВИДЖЕТА ========== */
        .widget-error {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            text-align: center;
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 12px;
            margin: 20px;
        }
        
        .widget-error .error-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        .widget-error h4 {
            font-size: 18px;
            font-weight: 600;
            color: #991b1b;
            margin-bottom: 8px;
        }
        
        .widget-error p {
            color: #7f1d1d;
            margin-bottom: 16px;
        }
        
        .retry-btn {
            padding: 8px 16px;
            background: #dc2626;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }
        
        .retry-btn:hover {
            background: #b91c1c;
        }
        
        /* ========== КРИТИЧЕСКАЯ ОШИБКА ========== */
        .critical-error {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px;
            text-align: center;
            font-family: system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .critical-error .error-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        
        .critical-error h2 {
            font-size: 28px;
            margin-bottom: 16px;
        }
        
        .critical-error details {
            margin: 24px 0;
            text-align: left;
            background: rgba(0,0,0,0.2);
            padding: 16px;
            border-radius: 8px;
            max-width: 600px;
        }
        
        .critical-error pre {
            background: rgba(0,0,0,0.3);
            padding: 12px;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 12px;
        }
        
        .critical-error .actions {
            display: flex;
            gap: 12px;
        }
        
        .critical-error .btn-primary,
        .critical-error .btn-secondary {
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 500;
            border: none;
            cursor: pointer;
        }
        
        .critical-error .btn-primary {
            background: white;
            color: #667eea;
        }
        
        .critical-error .btn-secondary {
            background: rgba(255,255,255,0.2);
            color: white;
        }
        
        /* ========== АДАПТИВНОСТЬ ========== */
        @media (max-width: 640px) {
            .app-header {
                padding: 0 16px;
            }
            
            .app-nav button {
                padding: 8px 12px;
            }
            
            .app-main {
                padding: 12px;
            }
            
            .version-badge {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- Корневой элемент приложения -->
    <div id="app-root">
        <!-- Начальный лоадер -->
        <div class="app-initial-loader" id="initial-loader">
            <div class="loader-logo">SH CRM 2.0</div>
            <div class="loader-spinner-large"></div>
            <span class="loader-text">Загрузка системы...</span>
            <span class="loader-subtext">Готовим рабочее пространство</span>
        </div>
    </div>
    
    <!-- Резервное сообщение при ошибке загрузки JS -->
    <div id="error-fallback" style="display: none; text-align: center; padding: 40px; font-family: system-ui, sans-serif;">
        <h2 style="color: #0f172a; margin-bottom: 16px;">Не удалось загрузить приложение</h2>
        <p style="color: #64748b; margin-bottom: 24px;">Проверьте подключение к интернету и обновите страницу</p>
        <div style="display: flex; gap: 12px; justify-content: center;">
            <button onclick="location.reload()" style="padding: 12px 32px; background: #0f172a; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600;">
                🔄 Обновить
            </button>
            <button onclick="localStorage.clear();location.reload()" style="padding: 12px 32px; background: #e2e8f0; color: #0f172a; border: none; border-radius: 8px; cursor: pointer; font-weight: 600;">
                🧹 Очистить кэш
            </button>
        </div>
    </div>
    
    <!-- Точка входа в приложение (НОВАЯ АРХИТЕКТУРА) -->
    <script type="module" src="core-new/main.js?v=2.0.0"></script>
    
    <!-- Обработка ошибок загрузки -->
    <script>
        // Таймаут для показа ошибки
        const loadTimeout = setTimeout(() => {
            const loader = document.getElementById('initial-loader');
            const fallback = document.getElementById('error-fallback');
            const root = document.getElementById('app-root');
            
            if (loader && root && root.children.length <= 1) {
                loader.style.display = 'none';
                fallback.style.display = 'block';
            }
        }, 10000);
        
        // Слушаем событие готовности приложения
        window.addEventListener('app:ready', () => {
            clearTimeout(loadTimeout);
            const loader = document.getElementById('initial-loader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.display = 'none';
                }, 300);
            }
        });
        
        // Глобальный перехват ошибок
        window.addEventListener('error', (e) => {
            console.warn('[Global] Error:', e.message);
        });
        
        window.addEventListener('unhandledrejection', (e) => {
            console.warn('[Global] Unhandled rejection:', e.reason);
        });
    </script>
    
    <!-- Noscript -->
    <noscript>
        <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; text-align: center; font-family: system-ui, sans-serif; background: #f1f5f9;">
            <h1 style="margin-bottom: 16px; color: #0f172a;">Требуется JavaScript</h1>
            <p style="color: #64748b;">Для работы SH CRM 2.0 необходимо включить JavaScript в настройках браузера.</p>
        </div>
    </noscript>
</body>
</html>
