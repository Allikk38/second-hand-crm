<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    
    <!-- PWA мета-теги -->
    <meta name="theme-color" content="#0070f3">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SH CRM">
    
    <!-- SEO -->
    <meta name="description" content="Second Hand CRM - Профессиональная система управления магазином секонд-хенд">
    <meta name="robots" content="noindex, nofollow">
    
    <title>Second Hand CRM</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230070f3'/%3E%3Ctext x='50' y='70' font-size='50' text-anchor='middle' fill='white' font-family='Arial' font-weight='bold'%3ESH%3C/text%3E%3C/svg%3E">
    
    <!-- Apple touch icon -->
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230070f3'/%3E%3Ctext x='50' y='70' font-size='50' text-anchor='middle' fill='white' font-family='Arial' font-weight='bold'%3ESH%3C/text%3E%3C/svg%3E">
    
    <!-- Основные стили -->
    <link rel="stylesheet" href="css/styles.css">
    
    <!-- Предзагрузка -->
    <link rel="preconnect" href="https://bhdwniiyrrujeoubrvle.supabase.co">
    <link rel="preconnect" href="https://esm.sh">
    <link rel="dns-prefetch" href="https://bhdwniiyrrujeoubrvle.supabase.co">
    
    <!-- Базовые стили на случай если CSS не загрузится -->
    <style>
        /* Критические стили */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            -webkit-font-smoothing: antialiased;
        }
        #app-root {
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        .loading-overlay {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 16px;
            color: #6b7280;
        }
        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 3px solid #e0e0e0;
            border-top-color: #0070f3;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .loading-text {
            font-size: 16px;
            font-weight: 500;
        }
        .loading-subtext {
            font-size: 13px;
            opacity: 0.6;
            margin-top: 8px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .error-fallback {
            display: none;
            text-align: center;
            padding: 40px;
            color: #c62828;
        }
        .error-fallback button {
            margin-top: 16px;
            padding: 10px 24px;
            background: #0070f3;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div id="app-root">
        <!-- Начальный лоадер -->
        <div class="loading-overlay" id="initial-loader">
            <div class="loading-spinner large"></div>
            <span class="loading-text">Second Hand CRM</span>
            <span class="loading-subtext">Загрузка системы...</span>
        </div>
    </div>
    
    <!-- Резервное сообщение при ошибке -->
    <div id="error-fallback" class="error-fallback">
        <h2>Не удалось загрузить приложение</h2>
        <p>Проверьте подключение к интернету и обновите страницу</p>
        <button onclick="location.reload()">Обновить</button>
    </div>
    
    <!-- Основной модуль приложения -->
    <script type="module" src="main.js"></script>
    
    <!-- Обработка ошибок загрузки -->
    <script>
        // Показываем ошибку если приложение не загрузилось за 10 секунд
        setTimeout(function() {
            var loader = document.getElementById('initial-loader');
            var fallback = document.getElementById('error-fallback');
            if (loader && loader.style.display !== 'none') {
                loader.style.display = 'none';
                fallback.style.display = 'block';
            }
        }, 10000);
        
        // Глобальный обработчик ошибок
        window.addEventListener('error', function(e) {
            console.warn('Global error:', e.message);
        });
        
        // Обработчик для Promise rejection
        window.addEventListener('unhandledrejection', function(e) {
            console.warn('Unhandled promise rejection:', e.reason);
        });
    </script>
    
    <!-- Noscript сообщение -->
    <noscript>
        <div style="text-align: center; padding: 50px; font-family: system-ui, sans-serif; background: #f5f7fa; height: 100vh; display: flex; flex-direction: column; justify-content: center;">
            <h1 style="color: #1a1a1a; margin-bottom: 16px;">Требуется JavaScript</h1>
            <p style="color: #6b7280; margin-bottom: 24px;">Для работы Second Hand CRM необходимо включить JavaScript в настройках браузера.</p>
            <div style="color: #9e9e9e; font-size: 14px;">Second Hand CRM — профессиональная система управления</div>
        </div>
    </noscript>
</body>
</html>
