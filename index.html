<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SH CRM</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        /* Сплэш-экран */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .splash-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
        }
        .splash-content {
            text-align: center;
            padding: 2rem;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 90%;
        }
        .splash-logo { font-size: 48px; margin-bottom: 1rem; }
        .splash-title {
            font-size: 1.875rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 0.5rem;
        }
        .splash-subtitle { font-size: 1rem; color: #64748b; margin-bottom: 1.5rem; }
        .splash-loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e2e8f0;
            border-top-color: #2563eb;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .splash-error {
            color: #dc2626;
            margin-top: 1rem;
            display: none;
        }
        .splash-error.show { display: block; }
        .btn-retry {
            margin-top: 1rem;
            background: #2563eb;
            color: white;
            border: none;
            padding: 0.5rem 1.5rem;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
        }
        .btn-manual {
            background: transparent;
            color: #475569;
            border: 1px solid #e2e8f0;
            margin-left: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="splash-screen" id="splashScreen">
        <div class="splash-content">
            <div class="splash-logo">🛍️</div>
            <h1 class="splash-title">SH CRM</h1>
            <p class="splash-subtitle">Управление комиссионным магазином</p>
            
            <div class="splash-loader" id="splashLoader">
                <div class="loading-spinner"></div>
                <p id="splashMessage">Проверка сессии...</p>
            </div>
            
            <div class="splash-error" id="splashError">
                <p id="errorMessage">Не удалось подключиться к серверу</p>
                <div>
                    <button class="btn-retry" id="retryBtn">Попробовать снова</button>
                    <button class="btn-retry btn-manual" id="loginBtn">Войти</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Используем официальный CDN Supabase для надежной проверки сессии -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Конфигурация Supabase
        const SUPABASE_URL = 'https://bhdwniiyrrujeoubrvle.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_EZ_RGBwpdbz9O2N8hX_wXw_NjbslvTP';
        
        // Инициализация клиента
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const DOM = {
            splashLoader: document.getElementById('splashLoader'),
            splashMessage: document.getElementById('splashMessage'),
            splashError: document.getElementById('splashError'),
            errorMessage: document.getElementById('errorMessage'),
            retryBtn: document.getElementById('retryBtn'),
            loginBtn: document.getElementById('loginBtn')
        };

        /**
         * Проверяет сессию и редиректит
         */
        async function checkSessionAndRedirect() {
            try {
                DOM.splashMessage.textContent = 'Проверка сессии...';
                
                const { data: { session }, error } = await supabase.auth.getSession();
                
                if (error) throw error;
                
                if (session?.user) {
                    DOM.splashMessage.textContent = 'Вход выполнен, загружаем приложение...';
                    
                    // Проверяем сохраненный URL для возврата
                    const returnUrl = sessionStorage.getItem('sh_auth_return_url');
                    
                    if (returnUrl) {
                        sessionStorage.removeItem('sh_auth_return_url');
                        window.location.href = returnUrl;
                    } else {
                        // По умолчанию на склад
                        window.location.href = 'pages/inventory.html';
                    }
                } else {
                    DOM.splashMessage.textContent = 'Перенаправление на страницу входа...';
                    
                    setTimeout(() => {
                        window.location.href = 'pages/login.html';
                    }, 500);
                }
            } catch (error) {
                console.error('[Index] Session check error:', error);
                
                DOM.splashLoader.style.display = 'none';
                DOM.splashError.classList.add('show');
                
                let errorText = 'Не удалось подключиться к серверу';
                if (error.message.includes('fetch') || error.message.includes('network')) {
                    errorText = 'Проблемы с подключением к интернету';
                } else if (error.message.includes('Invalid API key')) {
                    errorText = 'Ошибка конфигурации приложения (API ключ)';
                }
                
                DOM.errorMessage.textContent = errorText;
            }
        }

        // Обработчики
        DOM.retryBtn.addEventListener('click', () => {
            DOM.splashError.classList.remove('show');
            DOM.splashLoader.style.display = 'flex';
            checkSessionAndRedirect();
        });

        DOM.loginBtn.addEventListener('click', () => {
            window.location.href = 'pages/login.html';
        });

        // Запуск
        checkSessionAndRedirect();

        // Fallback на случай зависания (10 сек)
        setTimeout(() => {
            if (DOM.splashLoader.style.display !== 'none') {
                const msg = DOM.splashMessage.textContent;
                if (msg.includes('Проверка') || msg.includes('Перенаправление')) {
                    console.warn('[Index] Timeout, showing manual buttons');
                    DOM.splashLoader.style.display = 'none';
                    DOM.splashError.classList.add('show');
                    DOM.errorMessage.textContent = 'Превышено время ожидания. Проверьте подключение к интернету.';
                }
            }
        }, 10000);
    </script>
</body>
</html>
