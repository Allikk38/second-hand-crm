<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Вход | SH CRM</title>
    
    <!-- Основные стили -->
    <link rel="stylesheet" href="../css/styles.css">
    
    <!-- Дополнительные стили для страницы входа -->
    <style>
        /* Стили специфичные только для страницы входа */
        .login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: var(--spacing-4);
            background: var(--color-bg);
        }
        
        .login-container {
            width: 100%;
            max-width: 420px;
        }
        
        .login-card {
            padding: var(--spacing-8);
            background: var(--color-white);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            border: var(--border-width) solid var(--color-border);
        }
        
        .login-header {
            text-align: center;
            margin-bottom: var(--spacing-6);
        }
        
        .login-header h1 {
            font-size: var(--font-size-2xl);
            font-weight: var(--font-weight-bold);
            color: var(--color-text);
            margin-bottom: var(--spacing-2);
        }
        
        .login-header p {
            color: var(--color-text-secondary);
            font-size: var(--font-size-sm);
        }
        
        .login-form {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-4);
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-1);
        }
        
        .form-group label {
            font-size: var(--font-size-sm);
            font-weight: var(--font-weight-medium);
            color: var(--color-text);
        }
        
        .form-control {
            height: var(--input-height-lg);
            padding: 0 var(--spacing-4);
            font-size: var(--font-size-base);
            border: var(--border-width) solid var(--color-border);
            border-radius: var(--radius-md);
            background: var(--color-white);
            transition: border-color var(--transition-fast);
        }
        
        .form-control:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: var(--shadow-outline);
        }
        
        .form-control.error {
            border-color: var(--color-danger);
        }
        
        .error-message {
            font-size: var(--font-size-xs);
            color: var(--color-danger);
            min-height: 20px;
        }
        
        .form-error {
            padding: var(--spacing-3);
            background: var(--color-danger-bg);
            border-radius: var(--radius-md);
            color: var(--color-danger-dark);
            font-size: var(--font-size-sm);
            border-left: 3px solid var(--color-danger);
            display: none;
        }
        
        .form-error.show {
            display: block;
        }
        
        .btn-login {
            width: 100%;
            height: var(--button-height-lg);
            margin-top: var(--spacing-2);
            font-size: var(--font-size-base);
            font-weight: var(--font-weight-semibold);
        }
        
        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        .login-footer {
            margin-top: var(--spacing-6);
            text-align: center;
            font-size: var(--font-size-sm);
            color: var(--color-text-secondary);
        }
        
        .login-footer a {
            color: var(--color-primary);
            font-weight: var(--font-weight-medium);
            text-decoration: none;
        }
        
        .login-footer a:hover {
            text-decoration: underline;
        }
        
        .offline-banner {
            padding: var(--spacing-3);
            margin-bottom: var(--spacing-4);
            background: var(--color-warning-bg);
            border-radius: var(--radius-md);
            color: var(--color-warning-dark);
            font-size: var(--font-size-sm);
            text-align: center;
            border-left: 3px solid var(--color-warning);
            display: none;
        }
        
        .offline-banner.show {
            display: block;
        }
        
        /* Модальное окно регистрации */
        .register-modal .modal {
            max-width: 480px;
        }
        
        .register-form {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-4);
        }
        
        .demo-credentials {
            margin-top: var(--spacing-4);
            padding: var(--spacing-3);
            background: var(--color-gray-50);
            border-radius: var(--radius-md);
            font-size: var(--font-size-xs);
            color: var(--color-text-muted);
            text-align: center;
        }
        
        .demo-credentials code {
            background: var(--color-gray-200);
            padding: var(--spacing-0-5) var(--spacing-1);
            border-radius: var(--radius-sm);
        }
        
        @media (max-width: 480px) {
            .login-card {
                padding: var(--spacing-5);
            }
        }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-container">
            <!-- Баннер офлайн-режима -->
            <div class="offline-banner" id="offlineBanner">
                ⚠️ Нет подключения к интернету. Вход возможен только при наличии сети.
            </div>
            
            <div class="login-card">
                <div class="login-header">
                    <h1>SH CRM</h1>
                    <p>Управление комиссионным магазином</p>
                </div>
                
                <form class="login-form" id="loginForm">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email"
                            class="form-control" 
                            placeholder="user@example.com" 
                            autocomplete="email"
                            required
                        >
                        <div class="error-message" id="emailError"></div>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Пароль</label>
                        <input 
                            type="password" 
                            id="password" 
                            name="password"
                            class="form-control" 
                            placeholder="••••••••" 
                            autocomplete="current-password"
                            required
                        >
                        <div class="error-message" id="passwordError"></div>
                    </div>
                    
                    <div class="form-error" id="formError"></div>
                    
                    <button type="submit" class="btn-primary btn-login" id="loginBtn">
                        <span class="btn-text">Войти</span>
                        <span class="btn-loader" style="display: none;">
                            <span class="loading-spinner small"></span>
                            Вход...
                        </span>
                    </button>
                </form>
                
                <div class="login-footer">
                    <p>
                        Нет аккаунта? 
                        <a href="#" id="showRegisterBtn">Зарегистрироваться</a>
                    </p>
                </div>
                
                <!-- Демо-доступ (только для разработки) -->
                <div class="demo-credentials" id="demoCredentials" style="display: none;">
                    <p>Демо доступ:</p>
                    <code>demo@example.com / demo123</code>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Контейнер для модальных окон -->
    <div id="modalContainer"></div>
    
    <!-- Контейнер для уведомлений -->
    <div id="notificationContainer"></div>
    
    <!-- Основной скрипт страницы -->
    <script type="module" src="../js/login.js"></script>
</body>
</html>
