<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | SH CRM</title>
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        .login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #f1f5f9;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 6px -2px rgba(0,0,0,0.05);
        }
        .login-card h2 {
            margin-bottom: 8px;
            text-align: center;
        }
        .login-subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 24px;
        }
        .error-message {
            color: #dc2626;
            font-size: 14px;
            margin-top: 8px;
            display: none;
        }
        .btn-block {
            width: 100%;
            margin-top: 16px;
        }
        .register-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }
        .register-link a {
            color: #0f172a;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <h2>SH CRM</h2>
            <p class="login-subtitle">Вход в систему</p>
            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" class="form-control" placeholder="user@example.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
                </div>
                <div class="error-message" id="errorMessage"></div>
                <button type="submit" class="btn-primary btn-block" id="submitBtn">Войти</button>
            </form>
            <p class="register-link">
                Нет аккаунта? <a href="#" id="showRegisterBtn">Зарегистрироваться</a>
            </p>
        </div>
    </div>
    
    <!-- Модалка регистрации -->
    <div class="modal-overlay" id="registerModal" style="display: none;">
        <div class="modal">
            <div class="modal-header">
                <h3>Регистрация</h3>
                <button class="btn-close" id="closeRegisterModal">✕</button>
            </div>
            <div class="modal-body">
                <form id="registerForm">
                    <div class="form-group">
                        <label>Имя</label>
                        <input type="text" id="regName" class="form-control" placeholder="Иван Петров" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="regEmail" class="form-control" placeholder="user@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Пароль</label>
                        <input type="password" id="regPassword" class="form-control" placeholder="••••••••" required minlength="6">
                    </div>
                    <div class="error-message" id="regErrorMessage"></div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" id="cancelRegister">Отмена</button>
                <button class="btn-primary" id="registerSubmitBtn">Зарегистрироваться</button>
            </div>
        </div>
    </div>
    
    <script type="module">
        import { supabase } from '../core/supabase.js';
        import { checkAuth } from '../core/auth.js';
        
        // Если уже авторизован — на склад
        const user = await checkAuth();
        if (user) {
            window.location.href = 'inventory.html';
        }
        
        // Элементы
        const form = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const errorEl = document.getElementById('errorMessage');
        const submitBtn = document.getElementById('submitBtn');
        
        const registerModal = document.getElementById('registerModal');
        const showRegisterBtn = document.getElementById('showRegisterBtn');
        const closeRegisterModal = document.getElementById('closeRegisterModal');
        const cancelRegister = document.getElementById('cancelRegister');
        const registerForm = document.getElementById('registerForm');
        const regName = document.getElementById('regName');
        const regEmail = document.getElementById('regEmail');
        const regPassword = document.getElementById('regPassword');
        const regErrorEl = document.getElementById('regErrorMessage');
        const registerSubmitBtn = document.getElementById('registerSubmitBtn');
        
        // Вход
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            
            if (!email || !password) {
                errorEl.textContent = 'Введите email и пароль';
                errorEl.style.display = 'block';
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Вход...';
            errorEl.style.display = 'none';
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                
                if (error) {
                    if (error.message.includes('Invalid login')) {
                        throw new Error('Неверный email или пароль');
                    }
                    throw error;
                }
                
                if (data.user) {
                    window.location.href = 'inventory.html';
                }
            } catch (error) {
                errorEl.textContent = error.message;
                errorEl.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Войти';
            }
        });
        
        // Показать модалку регистрации
        showRegisterBtn.addEventListener('click', (e) => {
            e.preventDefault();
            registerModal.style.display = 'flex';
            regName.value = '';
            regEmail.value = '';
            regPassword.value = '';
            regErrorEl.style.display = 'none';
        });
        
        // Закрыть модалку
        const closeModal = () => registerModal.style.display = 'none';
        closeRegisterModal.addEventListener('click', closeModal);
        cancelRegister.addEventListener('click', closeModal);
        registerModal.addEventListener('click', (e) => {
            if (e.target === registerModal) closeModal();
        });
        
        // Регистрация
        registerSubmitBtn.addEventListener('click', async () => {
            const name = regName.value.trim();
            const email = regEmail.value.trim();
            const password = regPassword.value;
            
            if (!name || !email || !password) {
                regErrorEl.textContent = 'Заполните все поля';
                regErrorEl.style.display = 'block';
                return;
            }
            
            if (password.length < 6) {
                regErrorEl.textContent = 'Пароль должен быть не менее 6 символов';
                regErrorEl.style.display = 'block';
                return;
            }
            
            registerSubmitBtn.disabled = true;
            registerSubmitBtn.textContent = 'Регистрация...';
            regErrorEl.style.display = 'none';
            
            try {
                const { data, error } = await supabase.auth.signUp({
                    email,
                    password,
                    options: { data: { full_name: name } }
                });
                
                if (error) throw error;
                
                if (data.user) {
                    // Создаем профиль
                    await supabase.from('profiles').insert({
                        id: data.user.id,
                        full_name: name,
                        email: email,
                        created_at: new Date().toISOString()
                    });
                    
                    alert('Регистрация успешна! Теперь вы можете войти.');
                    closeModal();
                }
            } catch (error) {
                regErrorEl.textContent = error.message;
                regErrorEl.style.display = 'block';
            } finally {
                registerSubmitBtn.disabled = false;
                registerSubmitBtn.textContent = 'Зарегистрироваться';
            }
        });
    </script>
</body>
</html>
