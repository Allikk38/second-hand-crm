<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Вход | SH CRM</title>
    
    <!-- Базовый путь для GitHub Pages -->
    <base href="/second-hand-crm/">
    
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    
    <!-- Основные стили -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/components/forms.css">
    <link rel="stylesheet" href="css/components/buttons.css">
    
    <style>
        .login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: 100dvh;
            padding: var(--spacing-4);
            background: var(--color-bg);
        }
        
        .login-container {
            width: 100%;
            max-width: 420px;
        }
        
        .login-card {
            padding: var(--spacing-8);
            background: var(--color-white);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            border: var(--border-width) solid var(--color-border);
        }
        
        .login-header {
            text-align: center;
            margin-bottom: var(--spacing-6);
        }
        
        .login-header h1 {
            font-size: var(--font-size-2xl);
            font-weight: var(--font-weight-bold);
            color: var(--color-text);
            margin-bottom: var(--spacing-2);
        }
        
        .login-header p {
            color: var(--color-text-secondary);
            font-size: var(--font-size-sm);
        }
        
        .login-form {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-4);
        }
        
        .btn-login {
            width: 100%;
            height: var(--button-height-lg);
            margin-top: var(--spacing-2);
            font-size: var(--font-size-base);
            font-weight: var(--font-weight-semibold);
        }
        
        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        /* Офлайн-баннер */
        .offline-banner {
            padding: var(--spacing-3);
            margin-bottom: var(--spacing-4);
            background: var(--color-warning-bg);
            border-radius: var(--radius-md);
            color: var(--color-warning-dark);
            font-size: var(--font-size-sm);
            text-align: center;
            border-left: 3px solid var(--color-warning);
            display: none;
        }
        
        .offline-banner.show {
            display: block;
        }
        
        /* Лоадер внутри кнопки */
        .btn-loader {
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-2);
        }
        
        .loading-spinner.small {
            width: 16px;
            height: 16px;
            border: 2px solid var(--color-border);
            border-top-color: var(--color-white);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Адаптивность */
        @media (max-width: 480px) {
            .login-card {
                padding: var(--spacing-5);
            }
            
            .login-header h1 {
                font-size: var(--font-size-xl);
            }
        }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-container">
            <!-- Баннер офлайн-режима -->
            <div class="offline-banner" id="offlineBanner">
                ⚠️ Нет подключения к интернету. Вход возможен только при наличии сети.
            </div>
            
            <div class="login-card">
                <div class="login-header">
                    <h1>SH CRM</h1>
                    <p>Управление комиссионным магазином</p>
                </div>
                
                <form class="login-form" id="loginForm">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email"
                            class="form-control" 
                            placeholder="user@example.com" 
                            autocomplete="email"
                            required
                        >
                        <div class="error-message" id="emailError"></div>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Пароль</label>
                        <input 
                            type="password" 
                            id="password" 
                            name="password"
                            class="form-control" 
                            placeholder="••••••••" 
                            autocomplete="current-password"
                            required
                        >
                        <div class="error-message" id="passwordError"></div>
                    </div>
                    
                    <div class="form-error" id="formError"></div>
                    
                    <button type="submit" class="btn-primary btn-login" id="loginBtn">
                        <span class="btn-text">Войти</span>
                        <span class="btn-loader" style="display: none;">
                            <span class="loading-spinner small"></span>
                            <span>Вход...</span>
                        </span>
                    </button>
                </form>
            </div>
        </div>
    </div>
    
    <!-- Контейнер для уведомлений -->
    <div id="notificationContainer"></div>
    
    <!-- Основной скрипт страницы -->
    <script type="module" src="js/login.js"></script>
    
    <!-- PWA: Регистрация Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/second-hand-crm/sw.js', { scope: '/second-hand-crm/' })
                .then(reg => console.log('[PWA] SW registered:', reg.scope))
                .catch(err => console.warn('[PWA] SW failed:', err));
        }
    </script>
    
    <!-- Fallback на случай ошибки -->
    <script>
        (function() {
            const form = document.getElementById('loginForm');
            const loginBtn = document.getElementById('loginBtn');
            const offlineBanner = document.getElementById('offlineBanner');
            
            if (!navigator.onLine && offlineBanner) {
                offlineBanner.classList.add('show');
            }
            
            window.addEventListener('online', function() {
                if (offlineBanner) offlineBanner.classList.remove('show');
            });
            
            window.addEventListener('offline', function() {
                if (offlineBanner) offlineBanner.classList.add('show');
            });
        })();
    </script>
</body>
</html>
