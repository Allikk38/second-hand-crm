<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Отчеты | SH CRM</title>
    
    <!-- Базовый путь для GitHub Pages -->
    <base href="/second-hand-crm/">
    
    <!-- Основные стили -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/layouts/reports.css">
    
    <style>
        /* Стили только для этой страницы (переопределения) */
        .reports-page {
            display: flex;
            flex-direction: column;
            height: 100%;
            min-height: 0;
            background: var(--color-bg);
        }
        
        /* Офлайн-баннер */
        .offline-banner {
            display: none;
            align-items: center;
            justify-content: space-between;
            padding: var(--spacing-3) var(--spacing-4);
            margin-bottom: var(--spacing-4);
            background: var(--color-warning-bg);
            border-radius: var(--radius-md);
            border-left: 3px solid var(--color-warning);
        }
        
        .offline-banner .message {
            flex: 1;
            font-size: var(--font-size-sm);
            color: var(--color-warning-dark);
            font-weight: var(--font-weight-medium);
        }
        
        .offline-banner .btn-ghost {
            padding: var(--spacing-1) var(--spacing-3);
            font-size: var(--font-size-xs);
            background: transparent;
            border: var(--border-width) solid var(--color-warning);
            color: var(--color-warning-dark);
            border-radius: var(--radius-md);
            cursor: pointer;
            margin-left: var(--spacing-3);
        }
        
        .offline-banner .btn-ghost:hover {
            background: var(--color-warning);
            color: var(--color-white);
        }
        
        /* Скелетон-лоадер */
        .skeleton-kpi {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: var(--spacing-4);
            margin-bottom: var(--spacing-5);
        }
        
        .skeleton-card {
            height: 100px;
            background: var(--color-gray-200);
            border-radius: var(--radius-lg);
            animation: skeleton-pulse 1.5s ease-in-out infinite;
        }
        
        .skeleton-chart {
            height: 250px;
            background: var(--color-gray-200);
            border-radius: var(--radius-lg);
            animation: skeleton-pulse 1.5s ease-in-out infinite;
        }
        
        .skeleton-table {
            height: 400px;
            background: var(--color-gray-200);
            border-radius: var(--radius-lg);
            animation: skeleton-pulse 1.5s ease-in-out infinite;
        }
        
        @keyframes skeleton-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* Пустое состояние */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-16);
            text-align: center;
            color: var(--color-text-muted);
            background: var(--color-white);
            border-radius: var(--radius-lg);
            border: var(--border-width) dashed var(--color-border);
        }
        
        .empty-state-icon {
            font-size: 64px;
            margin-bottom: var(--spacing-4);
            opacity: 0.5;
        }
        
        /* Ошибка загрузки */
        .load-error {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-16);
            text-align: center;
            background: var(--color-white);
            border-radius: var(--radius-lg);
            border: var(--border-width) solid var(--color-border);
        }
        
        .load-error-icon {
            font-size: 48px;
            margin-bottom: var(--spacing-4);
            opacity: 0.5;
        }
        
        /* Лоадер внутри контента */
        .reports-loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 400px;
            gap: var(--spacing-4);
            color: var(--color-text-muted);
        }
        
        .loading-spinner.large {
            width: 48px;
            height: 48px;
            border-width: 3px;
        }
        
        /* Адаптивность */
        @media (max-width: 768px) {
            .skeleton-kpi {
                grid-template-columns: repeat(2, 1fr);
                gap: var(--spacing-3);
            }
            
            .skeleton-card {
                height: 80px;
            }
            
            .skeleton-chart {
                height: 200px;
            }
            
            .offline-banner {
                flex-wrap: wrap;
            }
            
            .offline-banner .btn-ghost {
                margin-left: 0;
                margin-top: var(--spacing-2);
                width: 100%;
            }
        }
        
        @media (max-width: 480px) {
            .skeleton-kpi {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Шапка приложения -->
        <header class="app-header">
            <h1>📊 SH CRM</h1>
            <nav class="app-nav" aria-label="Основная навигация">
                <a href="pages/inventory.html">Склад</a>
                <a href="pages/cashier.html">Касса</a>
                <a href="pages/reports.html" class="active" aria-current="page">Отчеты</a>
            </nav>
            <div class="header-actions">
                <span class="user-email" id="userEmail"></span>
                <button class="btn-ghost btn-sm" id="logoutBtn" aria-label="Выйти из системы">
                    🚪 Выход
                </button>
            </div>
        </header>
        
        <!-- Основной контент -->
        <main class="app-main">
            <div class="reports-page">
                <!-- Офлайн-баннер -->
                <div class="offline-banner" id="offlineBanner">
                    <span class="message">⚠️ Нет подключения к интернету. Работа в офлайн-режиме.</span>
                    <button class="btn-ghost" id="offlineRetryBtn">Повторить подключение</button>
                </div>
                
                <!-- Заголовок с переключателем периода -->
                <div class="reports-header">
                    <h1>Аналитика и отчеты</h1>
                    
                    <div class="period-selector">
                        <select id="periodSelect" class="period-select" aria-label="Выбор периода">
                            <option value="today">Сегодня</option>
                            <option value="yesterday">Вчера</option>
                            <option value="week" selected>Неделя</option>
                            <option value="month">Месяц</option>
                            <option value="quarter">Квартал</option>
                            <option value="year">Год</option>
                        </select>
                        
                        <button class="btn-secondary btn-sm" id="refreshBtn" aria-label="Обновить">
                            🔄
                        </button>
                        
                        <button class="btn-secondary btn-sm" id="exportBtn" aria-label="Экспорт">
                            📥 Экспорт
                        </button>
                    </div>
                </div>
                
                <!-- Вкладки -->
                <div class="reports-tabs" role="tablist">
                    <button class="tab-btn active" data-tab="dashboard" role="tab" aria-selected="true">
                        📊 Дашборд
                    </button>
                    <button class="tab-btn" data-tab="sales" role="tab" aria-selected="false">
                        💰 Продажи
                    </button>
                    <button class="tab-btn" data-tab="products" role="tab" aria-selected="false">
                        📦 Товары
                    </button>
                    <button class="tab-btn" data-tab="shifts" role="tab" aria-selected="false">
                        🔄 Смены
                    </button>
                </div>
                
                <!-- Контент -->
                <div class="reports-content" id="reportsContent">
                    <!-- Скелетон-лоадер (показывается при загрузке) -->
                    <div id="skeletonLoader">
                        <div class="skeleton-kpi">
                            <div class="skeleton-card"></div>
                            <div class="skeleton-card"></div>
                            <div class="skeleton-card"></div>
                            <div class="skeleton-card"></div>
                        </div>
                        <div class="skeleton-chart"></div>
                        <div class="skeleton-chart" style="margin-top: var(--spacing-4);"></div>
                    </div>
                    
                    <!-- Сообщение об ошибке (скрыто по умолчанию) -->
                    <div class="load-error" id="errorMessage" style="display: none;">
                        <div class="load-error-icon">⚠️</div>
                        <h3>Ошибка загрузки</h3>
                        <p id="errorText">Не удалось загрузить данные отчетов</p>
                        <button class="btn-primary" id="retryBtn">Повторить</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <!-- Контейнер для модальных окон -->
    <div id="modalContainer"></div>
    
    <!-- Контейнер для уведомлений -->
    <div id="notificationContainer"></div>
    
    <!-- Основной скрипт страницы -->
    <script type="module" src="js/reports.js"></script>
    
    <!-- Fallback на случай ошибки загрузки модуля -->
    <script>
        (function() {
            const skeletonLoader = document.getElementById('skeletonLoader');
            const errorBlock = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            const retryBtn = document.getElementById('retryBtn');
            
            const timeoutId = setTimeout(function() {
                if (skeletonLoader && skeletonLoader.style.display !== 'none') {
                    console.warn('[Reports] Module load timeout');
                    if (skeletonLoader) skeletonLoader.style.display = 'none';
                    if (errorBlock) {
                        errorText.textContent = 'Превышено время ожидания. Проверьте подключение к интернету.';
                        errorBlock.style.display = 'flex';
                    }
                }
            }, 10000);
            
            if (retryBtn) {
                retryBtn.addEventListener('click', function() {
                    location.reload();
                });
            }
            
            window.addEventListener('error', function(e) {
                if (e.target && e.target.tagName === 'SCRIPT' && e.target.src && e.target.src.includes('reports.js')) {
                    console.error('[Reports] Script load error:', e);
                    clearTimeout(timeoutId);
                    if (skeletonLoader) skeletonLoader.style.display = 'none';
                    if (errorBlock) {
                        errorText.textContent = 'Не удалось загрузить модуль страницы. Обновите страницу.';
                        errorBlock.style.display = 'flex';
                    }
                }
            });
        })();
    </script>
</body>
</html>
