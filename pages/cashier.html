<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Касса | SH CRM</title>
    
    <!-- Базовый путь для GitHub Pages -->
    <base href="/second-hand-crm/">
    
    <!-- Основные стили -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/layouts/cashier.css">
    <link rel="stylesheet" href="css/pages/cashier.css">
    
    <style>
        .cashier-page {
            display: flex;
            flex-direction: column;
            height: 100%;
            min-height: 0;
            background: var(--color-bg);
        }
        
        /* Индикатор загрузки модуля */
        .module-loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 400px;
            gap: var(--spacing-4);
        }
        
        .module-loading .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--color-border);
            border-top-color: var(--color-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        .module-loading .loading-status {
            font-size: var(--font-size-sm);
            color: var(--color-text-muted);
            text-align: center;
            max-width: 300px;
            line-height: 1.5;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Офлайн-баннер */
        .offline-banner {
            display: none;
            align-items: center;
            justify-content: space-between;
            padding: var(--spacing-3) var(--spacing-4);
            margin-bottom: var(--spacing-4);
            background: var(--color-warning-bg);
            border-radius: var(--radius-md);
            border-left: 3px solid var(--color-warning);
        }
        
        .offline-banner .message {
            flex: 1;
            font-size: var(--font-size-sm);
            color: var(--color-warning-dark);
            font-weight: var(--font-weight-medium);
        }
        
        .offline-banner .btn-ghost {
            padding: var(--spacing-1) var(--spacing-3);
            font-size: var(--font-size-xs);
            background: transparent;
            border: var(--border-width) solid var(--color-warning);
            color: var(--color-warning-dark);
            border-radius: var(--radius-md);
            cursor: pointer;
            margin-left: var(--spacing-3);
        }
        
        .offline-banner .btn-ghost:hover {
            background: var(--color-warning);
            color: var(--color-white);
        }
        
        /* Ошибка загрузки */
        .load-error {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 400px;
            text-align: center;
            padding: var(--spacing-6);
        }
        
        .load-error-icon {
            font-size: 64px;
            margin-bottom: var(--spacing-4);
            opacity: 0.5;
        }
        
        .load-error h3 {
            font-size: var(--font-size-xl);
            margin-bottom: var(--spacing-2);
            color: var(--color-text);
        }
        
        .load-error p {
            color: var(--color-text-muted);
            margin-bottom: var(--spacing-6);
            max-width: 400px;
            line-height: 1.5;
        }
        
        .load-error .btn-row {
            display: flex;
            gap: var(--spacing-3);
        }
        
        /* Адаптивность */
        @media (max-width: 768px) {
            .offline-banner {
                flex-wrap: wrap;
            }
            
            .offline-banner .btn-ghost {
                margin-left: 0;
                margin-top: var(--spacing-2);
                width: 100%;
            }
            
            .load-error .btn-row {
                flex-direction: column;
                width: 100%;
                max-width: 250px;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Шапка приложения -->
        <header class="app-header">
            <h1>💰 SH CRM</h1>
            <nav class="app-nav" aria-label="Основная навигация">
                <a href="pages/inventory.html">Склад</a>
                <a href="pages/cashier.html" class="active" aria-current="page">Касса</a>
                <a href="pages/reports.html">Отчеты</a>
            </nav>
            <div class="header-actions">
                <span class="user-email" id="userEmail"></span>
                <button class="btn-ghost btn-sm" id="logoutBtn" aria-label="Выйти из системы">
                    🚪 Выход
                </button>
            </div>
        </header>
        
        <!-- Основной контент -->
        <main class="app-main">
            <div class="cashier-page">
                <!-- Офлайн-баннер -->
                <div class="offline-banner" id="offlineBanner">
                    <span class="message">⚠️ Нет подключения к интернету. Работа в офлайн-режиме.</span>
                    <button class="btn-ghost" id="offlineRetryBtn">Повторить подключение</button>
                </div>
                
                <!-- Индикатор загрузки модуля -->
                <div id="moduleLoading" class="module-loading">
                    <div class="spinner"></div>
                    <p class="loading-status" id="loadingStatus">Загрузка модуля...</p>
                </div>
                
                <!-- Ошибка загрузки (скрыто) -->
                <div class="load-error" id="errorBlock">
                    <div class="load-error-icon">⚠️</div>
                    <h3>Ошибка загрузки</h3>
                    <p id="errorText">Не удалось загрузить страницу кассы.</p>
                    <div class="btn-row">
                        <button class="btn-primary" id="retryBtn">🔄 Повторить</button>
                        <a href="pages/inventory.html" class="btn-secondary">📦 На склад</a>
                    </div>
                </div>
                
                <!-- Контейнер для контента кассы -->
                <div id="cashierContent"></div>
            </div>
        </main>
    </div>
    
    <!-- Контейнер для модальных окон -->
    <div id="modalContainer"></div>
    
    <!-- Контейнер для уведомлений -->
    <div id="notificationContainer"></div>
    
    <!-- Основной скрипт страницы -->
    <script type="module" src="js/cashier.js"></script>
    
    <!-- Отслеживание загрузки модуля с таймаутом 60 секунд -->
    <script>
        (function() {
            const moduleLoading = document.getElementById('moduleLoading');
            const loadingStatus = document.getElementById('loadingStatus');
            const errorBlock = document.getElementById('errorBlock');
            const errorText = document.getElementById('errorText');
            const retryBtn = document.getElementById('retryBtn');
            
            let loadStartTime = Date.now();
            let checkInterval = null;
            let errorShown = false;
            const LOAD_TIMEOUT_MS = 60000; // 60 секунд — как на складе
            
            // Функция обновления статуса
            function updateLoadingStatus(message) {
                if (loadingStatus) {
                    loadingStatus.textContent = message;
                }
            }
            
            // Функция показа ошибки
            function showModuleError(message) {
                errorShown = true;
                if (moduleLoading) moduleLoading.style.display = 'none';
                if (errorBlock) {
                    errorText.textContent = message;
                    errorBlock.style.display = 'flex';
                }
            }
            
            // Функция скрытия ошибки
            function hideModuleError() {
                errorShown = false;
                if (errorBlock) {
                    errorBlock.style.display = 'none';
                }
            }
            
            // Экспорт функции для JS-модуля
            window.markCashierModuleLoaded = function() {
                if (!window.__cashierModuleLoaded) {
                    window.__cashierModuleLoaded = true;
                    clearInterval(checkInterval);
                    if (moduleLoading) moduleLoading.style.display = 'none';
                    if (errorShown) hideModuleError();
                    console.log('[Cashier] Module loaded successfully in', 
                        Math.floor((Date.now() - loadStartTime) / 1000), 's');
                }
            };
            
            // Периодическая проверка статуса с обновлением сообщений
            checkInterval = setInterval(function() {
                const elapsed = Math.floor((Date.now() - loadStartTime) / 1000);
                
                // Если модуль уже загрузился
                if (window.__cashierModuleLoaded) {
                    clearInterval(checkInterval);
                    if (moduleLoading) moduleLoading.style.display = 'none';
                    if (errorShown) hideModuleError();
                    return;
                }
                
                // Обновляем сообщение о статусе
                if (elapsed < 5) {
                    updateLoadingStatus('Загрузка модуля...');
                } else if (elapsed < 15) {
                    updateLoadingStatus('Подключение к серверу...');
                } else if (elapsed < 30) {
                    updateLoadingStatus('Синхронизация данных...');
                } else if (elapsed < 45) {
                    updateLoadingStatus('Медленное соединение. Пожалуйста, подождите...');
                } else if (elapsed < LOAD_TIMEOUT_MS / 1000) {
                    updateLoadingStatus('Восстановление соединения. Ожидайте...');
                } else {
                    // Таймаут
                    clearInterval(checkInterval);
                    console.warn('[Cashier] Module load timeout after ' + LOAD_TIMEOUT_MS / 1000 + 's');
                    showModuleError(
                        'Превышено время ожидания (' + LOAD_TIMEOUT_MS / 1000 + ' сек). ' +
                        'Проверьте подключение к интернету и попробуйте снова.'
                    );
                }
            }, 3000);
            
            // Кнопка повтора
            if (retryBtn) {
                retryBtn.addEventListener('click', function() {
                    window.__cashierModuleLoaded = false;
                    loadStartTime = Date.now();
                    errorShown = false;
                    if (moduleLoading) moduleLoading.style.display = 'flex';
                    if (errorBlock) errorBlock.style.display = 'none';
                    updateLoadingStatus('Переподключение...');
                    location.reload();
                });
            }
            
            // Перехват ошибки загрузки скрипта
            window.addEventListener('error', function(e) {
                if (e.target && e.target.tagName === 'SCRIPT' && 
                    e.target.src && e.target.src.includes('cashier.js')) {
                    console.error('[Cashier] Script load error:', e);
                    clearInterval(checkInterval);
                    window.__cashierModuleLoaded = false;
                    showModuleError(
                        'Не удалось загрузить модуль страницы. ' +
                        'Проверьте подключение к интернету и обновите страницу.'
                    );
                }
            }, true);
        })();
    </script>
</body>
</html>
