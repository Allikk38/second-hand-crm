<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Касса | SH CRM</title>
    
    <!-- Базовый путь для GitHub Pages -->
    <base href="/second-hand-crm/">
    
    <!-- Основные стили -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/layouts/cashier.css">
    <link rel="stylesheet" href="css/pages/cashier.css">
    
    <style>
        /* Стили только для этой страницы (переопределения при необходимости) */
        .cashier-page {
            display: flex;
            flex-direction: column;
            height: 100%;
            min-height: 0;
            background: var(--color-bg);
        }
        
        /* Офлайн-баннер */
        .offline-banner {
            display: none;
            align-items: center;
            justify-content: space-between;
            padding: var(--spacing-3) var(--spacing-4);
            margin-bottom: var(--spacing-4);
            background: var(--color-warning-bg);
            border-radius: var(--radius-md);
            border-left: 3px solid var(--color-warning);
        }
        
        .offline-banner .message {
            flex: 1;
            font-size: var(--font-size-sm);
            color: var(--color-warning-dark);
            font-weight: var(--font-weight-medium);
        }
        
        .offline-banner .btn-ghost {
            padding: var(--spacing-1) var(--spacing-3);
            font-size: var(--font-size-xs);
            background: transparent;
            border: var(--border-width) solid var(--color-warning);
            color: var(--color-warning-dark);
            border-radius: var(--radius-md);
            cursor: pointer;
            margin-left: var(--spacing-3);
        }
        
        .offline-banner .btn-ghost:hover {
            background: var(--color-warning);
            color: var(--color-white);
        }
        
        /* Состояние загрузки */
        .skeleton-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: var(--spacing-3);
            padding: var(--spacing-4);
        }
        
        .skeleton-card {
            aspect-ratio: 1;
            background: var(--color-gray-200);
            border-radius: var(--radius-lg);
            animation: skeleton-pulse 1.5s ease-in-out infinite;
        }
        
        @keyframes skeleton-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* Ошибка загрузки */
        .load-error {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            min-height: 400px;
            text-align: center;
            padding: var(--spacing-6);
        }
        
        .load-error-icon {
            font-size: 64px;
            margin-bottom: var(--spacing-4);
            opacity: 0.5;
        }
        
        .load-error h3 {
            font-size: var(--font-size-xl);
            margin-bottom: var(--spacing-2);
        }
        
        .load-error p {
            color: var(--color-text-muted);
            margin-bottom: var(--spacing-6);
        }
        
        /* Кнопка быстрого добавления товара */
        .quick-add-btn {
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-2);
            padding: 0 var(--spacing-4);
            height: 36px;
            background: var(--color-white);
            border: var(--border-width) solid var(--color-border);
            border-radius: var(--radius-md);
            font-size: var(--font-size-sm);
            font-weight: var(--font-weight-medium);
            color: var(--color-text);
            cursor: pointer;
            transition: background-color var(--transition-fast);
            margin-right: var(--spacing-2);
        }
        
        .quick-add-btn:hover {
            background: var(--color-gray-50);
            border-color: var(--color-gray-400);
        }
        
        .quick-add-btn .icon {
            font-size: 16px;
        }
        
        /* Панель инструментов кассы */
        .products-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--spacing-3) var(--spacing-4);
            background: var(--color-white);
            border-bottom: var(--border-width) solid var(--color-border);
            flex-wrap: wrap;
            gap: var(--spacing-2);
        }
        
        .toolbar-left {
            display: flex;
            align-items: center;
            gap: var(--spacing-2);
            flex: 1;
        }
        
        .toolbar-right {
            display: flex;
            align-items: center;
            gap: var(--spacing-2);
        }
        
        /* Мобильная адаптация */
        @media (max-width: 768px) {
            .skeleton-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: var(--spacing-2);
                padding: var(--spacing-2);
            }
            
            .offline-banner {
                flex-wrap: wrap;
            }
            
            .offline-banner .btn-ghost {
                margin-left: 0;
                margin-top: var(--spacing-2);
                width: 100%;
            }
            
            .products-toolbar {
                flex-direction: column;
                align-items: stretch;
            }
            
            .toolbar-left {
                flex-wrap: wrap;
            }
            
            .toolbar-right {
                justify-content: flex-end;
            }
            
            .quick-add-btn {
                flex: 1;
                justify-content: center;
            }
        }
        
        @media (max-width: 480px) {
            .quick-add-btn span:not(.icon) {
                display: none;
            }
            
            .quick-add-btn {
                padding: 0;
                width: 36px;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Шапка приложения -->
        <header class="app-header">
            <h1>💰 SH CRM</h1>
            <nav class="app-nav" aria-label="Основная навигация">
                <a href="pages/inventory.html">Склад</a>
                <a href="pages/cashier.html" class="active" aria-current="page">Касса</a>
                <a href="pages/reports.html">Отчеты</a>
            </nav>
            <div class="header-actions">
                <span class="user-email" id="userEmail"></span>
                <button class="btn-ghost btn-sm" id="logoutBtn" aria-label="Выйти из системы">
                    🚪 Выход
                </button>
            </div>
        </header>
        
        <!-- Основной контент -->
        <main class="app-main">
            <div class="cashier-page">
                <!-- Офлайн-баннер -->
                <div class="offline-banner" id="offlineBanner">
                    <span class="message">⚠️ Нет подключения к интернету. Работа в офлайн-режиме.</span>
                    <button class="btn-ghost" id="offlineRetryBtn">Повторить подключение</button>
                </div>
                
                <div id="cashierContent">
                    <!-- Скелетон-лоадер -->
                    <div class="skeleton-grid" id="skeletonLoader">
                        <div class="skeleton-card"></div>
                        <div class="skeleton-card"></div>
                        <div class="skeleton-card"></div>
                        <div class="skeleton-card"></div>
                        <div class="skeleton-card"></div>
                        <div class="skeleton-card"></div>
                    </div>
                    
                    <!-- Сообщение об ошибке (скрыто по умолчанию) -->
                    <div class="load-error" id="errorMessage" style="display: none;">
                        <div class="load-error-icon">⚠️</div>
                        <h3>Ошибка загрузки</h3>
                        <p id="errorText">Не удалось загрузить страницу</p>
                        <button class="btn-primary" id="reloadBtn">Обновить</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <!-- Контейнер для модальных окон -->
    <div id="modalContainer"></div>
    
    <!-- Контейнер для уведомлений -->
    <div id="notificationContainer"></div>
    
    <!-- Основной скрипт страницы -->
    <script type="module" src="js/cashier.js"></script>
    
    <!-- Fallback на случай ошибки загрузки модуля -->
    <script>
        (function() {
            const skeletonLoader = document.getElementById('skeletonLoader');
            const errorBlock = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            const reloadBtn = document.getElementById('reloadBtn');
            
            // Таймаут для проверки загрузки (8 секунд)
            const timeoutId = setTimeout(function() {
                // Проверяем, загрузился ли основной модуль
                if (skeletonLoader && skeletonLoader.style.display !== 'none') {
                    console.warn('[Cashier] Module load timeout');
                    if (skeletonLoader) skeletonLoader.style.display = 'none';
                    if (errorBlock) {
                        errorText.textContent = 'Превышено время ожидания. Проверьте подключение к интернету.';
                        errorBlock.style.display = 'flex';
                    }
                }
            }, 8000);
            
            // Обработчик кнопки обновления
            if (reloadBtn) {
                reloadBtn.addEventListener('click', function() {
                    location.reload();
                });
            }
            
            // Слушаем событие ошибки загрузки модуля
            window.addEventListener('error', function(e) {
                if (e.target && e.target.tagName === 'SCRIPT' && e.target.src && e.target.src.includes('cashier.js')) {
                    console.error('[Cashier] Script load error:', e);
                    clearTimeout(timeoutId);
                    if (skeletonLoader) skeletonLoader.style.display = 'none';
                    if (errorBlock) {
                        errorText.textContent = 'Не удалось загрузить модуль страницы. Проверьте подключение.';
                        errorBlock.style.display = 'flex';
                    }
                }
            });
        })();
    </script>
</body>
</html>
