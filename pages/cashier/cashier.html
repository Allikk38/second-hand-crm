<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- PWA / Мобильные мета-теги -->
    <meta name="theme-color" content="#0f172a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Касса SH CRM">
    <meta name="format-detection" content="telephone=no">
    
    <!-- SEO -->
    <meta name="description" content="Кассовый модуль Second Hand CRM. Профессиональное рабочее место кассира.">
    <meta name="robots" content="noindex, nofollow">
    
    <title>Касса | SH CRM</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230f172a'/%3E%3Ctext x='50' y='70' font-size='50' text-anchor='middle' fill='white' font-family='Arial' font-weight='bold'%3EК%3C/text%3E%3C/svg%3E">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230f172a'/%3E%3Ctext x='50' y='70' font-size='50' text-anchor='middle' fill='white' font-family='Arial' font-weight='bold'%3EК%3C/text%3E%3C/svg%3E">
    
    <!-- Предзагрузка -->
    <link rel="preconnect" href="https://bhdwniiyrrujeoubrvle.supabase.co">
    <link rel="preconnect" href="https://esm.sh">
    <link rel="dns-prefetch" href="https://bhdwniiyrrujeoubrvle.supabase.co">
    
    <!-- Основные стили -->
    <link rel="stylesheet" href="../../css/styles.css">
    
    <!-- Критические стили для быстрой отрисовки -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, sans-serif;
            background: #f1f5f9;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        #cashier-root {
            height: 100%;
            width: 100%;
        }
        
        /* Скелет загрузки */
        .cashier-loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 20px;
            color: #64748b;
        }
        
        .cashier-loader-spinner {
            width: 48px;
            height: 48px;
            border: 3px solid #e2e8f0;
            border-top-color: #0f172a;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .cashier-loader-text {
            font-size: 16px;
            font-weight: 500;
        }
        
        .cashier-loader-subtext {
            font-size: 13px;
            opacity: 0.6;
        }
        
        /* Ошибка загрузки */
        .cashier-error {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 20px;
            text-align: center;
            color: #64748b;
        }
        
        .cashier-error-icon {
            font-size: 64px;
            margin-bottom: 24px;
            opacity: 0.5;
        }
        
        .cashier-error h2 {
            font-size: 20px;
            font-weight: 600;
            color: #0f172a;
            margin-bottom: 12px;
        }
        
        .cashier-error p {
            margin-bottom: 24px;
        }
        
        .cashier-error button {
            padding: 12px 32px;
            background: #0f172a;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .cashier-error button:hover {
            background: #1e293b;
        }
        
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <!-- Чистый контейнер для кассового модуля -->
    <div id="cashier-root">
        <!-- Начальный лоадер (показывается до загрузки JS) -->
        <div class="cashier-loader" id="cashier-initial-loader">
            <div class="cashier-loader-spinner"></div>
            <span class="cashier-loader-text">Загрузка кассы...</span>
            <span class="cashier-loader-subtext">Подготовка рабочего места</span>
        </div>
    </div>
    
    <!-- Резервное сообщение при ошибке загрузки JS -->
    <div id="cashier-error-fallback" class="cashier-error hidden">
        <div class="cashier-error-icon">⚠️</div>
        <h2>Не удалось загрузить кассу</h2>
        <p>Проверьте подключение к интернету и обновите страницу</p>
        <button onclick="location.reload()">Обновить</button>
    </div>
    
    <!-- Основной модуль приложения -->
    <script type="module">
        // Точка входа для MPA страницы кассы
        import { CashierPage } from '../../modules/cashier/CashierPage.js';
        import { AuthManager } from '../../modules/auth/AuthManager.js';
        
        const root = document.getElementById('cashier-root');
        const loader = document.getElementById('cashier-initial-loader');
        const fallback = document.getElementById('cashier-error-fallback');
        
        // Таймаут загрузки (10 секунд)
        const loadTimeout = setTimeout(() => {
            if (loader && !loader.classList.contains('hidden')) {
                loader.classList.add('hidden');
                fallback.classList.remove('hidden');
            }
        }, 10000);
        
        try {
            // Проверяем аутентификацию
            const user = await AuthManager.init();
            
            if (!user) {
                // Перенаправляем на главную страницу входа
                window.location.href = '../../index.html';
                throw new Error('Not authenticated');
            }
            
            // Создаем и монтируем страницу кассы
            const cashierPage = new CashierPage(root);
            await cashierPage.mount();
            
            // Скрываем лоадер
            if (loader) {
                loader.classList.add('hidden');
            }
            
            clearTimeout(loadTimeout);
            
        } catch (error) {
            console.error('[Cashier] Failed to initialize:', error);
            
            clearTimeout(loadTimeout);
            
            if (loader) {
                loader.classList.add('hidden');
            }
            
            if (fallback) {
                fallback.classList.remove('hidden');
            }
            
            // Если ошибка аутентификации - редирект
            if (error.message === 'Not authenticated') {
                window.location.href = '../../index.html';
            }
        }
    </script>
    
    <!-- Noscript -->
    <noscript>
        <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; text-align: center; font-family: system-ui, sans-serif; background: #f1f5f9;">
            <h1 style="margin-bottom: 16px; color: #0f172a;">Требуется JavaScript</h1>
            <p style="color: #64748b;">Для работы кассы необходимо включить JavaScript в настройках браузера.</p>
        </div>
    </noscript>
</body>
</html>
