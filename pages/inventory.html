<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- Базовый URL для GitHub Pages -->
    <base href="/second-hand-crm/">
    
    <title>SH CRM</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f1f5f9;
        }
        
        .splash-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
        }
        
        .splash-content {
            max-width: 500px;
            width: 100%;
            text-align: center;
            padding: 2.5rem;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }
        
        .splash-logo {
            font-size: 64px;
            margin-bottom: 1rem;
        }
        
        .splash-title {
            font-size: 2rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 0.5rem;
        }
        
        .splash-subtitle {
            font-size: 1rem;
            color: #64748b;
            margin-bottom: 2rem;
        }
        
        .loading-spinner {
            width: 48px;
            height: 48px;
            margin: 0 auto 1rem;
            border: 3px solid #e2e8f0;
            border-top-color: #2563eb;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .status-message {
            font-size: 0.9rem;
            color: #64748b;
            margin-bottom: 1rem;
            min-height: 2.5rem;
        }
        
        .error-box {
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 8px;
            padding: 1rem;
            margin: 1rem 0;
            text-align: left;
            display: none;
        }
        
        .error-box.show {
            display: block;
        }
        
        .error-title {
            font-weight: 600;
            color: #dc2626;
            margin-bottom: 0.5rem;
        }
        
        .error-message {
            font-size: 0.85rem;
            color: #7f1d1d;
            margin-bottom: 0.5rem;
            word-break: break-word;
        }
        
        .error-details {
            font-size: 0.75rem;
            color: #991b1b;
            font-family: monospace;
            background: #fee2e2;
            padding: 0.5rem;
            border-radius: 4px;
            overflow-x: auto;
        }
        
        .btn-group {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }
        
        .btn {
            display: inline-block;
            padding: 0.625rem 1.25rem;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.15s;
        }
        
        .btn:hover {
            background: #1d4ed8;
        }
        
        .btn-secondary {
            background: #f1f5f9;
            color: #0f172a;
            border: 1px solid #e2e8f0;
        }
        
        .btn-secondary:hover {
            background: #e2e8f0;
        }
        
        .debug-info {
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid #e2e8f0;
            font-size: 0.75rem;
            color: #94a3b8;
            text-align: left;
        }
        
        .debug-info details {
            margin-top: 0.5rem;
        }
        
        .debug-info summary {
            cursor: pointer;
            color: #64748b;
        }
        
        .debug-info pre {
            margin-top: 0.5rem;
            padding: 0.5rem;
            background: #f8fafc;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 0.7rem;
        }
    </style>
</head>
<body>
    <div class="splash-screen" id="splashScreen">
        <div class="splash-content">
            <div class="splash-logo">🛍️</div>
            <h1 class="splash-title">SH CRM</h1>
            <p class="splash-subtitle">Управление комиссионным магазином</p>
            
            <div id="loadingSection">
                <div class="loading-spinner"></div>
                <p class="status-message" id="statusMessage">Проверка подключения...</p>
            </div>
            
            <div class="error-box" id="errorBox">
                <div class="error-title">⚠️ Ошибка загрузки</div>
                <div class="error-message" id="errorMessage"></div>
                <div class="error-details" id="errorDetails"></div>
            </div>
            
            <div class="btn-group" id="actionButtons" style="display: none;">
                <button class="btn" id="retryBtn">🔄 Попробовать снова</button>
                <button class="btn btn-secondary" id="loginBtn">🔐 Страница входа</button>
                <button class="btn btn-secondary" id="inventoryBtn">📦 На склад</button>
            </div>
            
            <div class="debug-info">
                <details>
                    <summary>🔧 Отладочная информация</summary>
                    <pre id="debugInfo">Загрузка...</pre>
                </details>
            </div>
        </div>
    </div>

    <script type="module">
        // ========================================
        // ТОЧКА ВХОДА С РАСШИРЕННОЙ ДИАГНОСТИКОЙ
        // ========================================
        
        const DEBUG = {
            startTime: new Date().toISOString(),
            baseURI: document.baseURI,
            location: window.location.href,
            steps: []
        };
        
        function addDebugStep(step, data = null) {
            DEBUG.steps.push({
                time: new Date().toISOString(),
                step,
                data: data ? JSON.stringify(data, null, 2) : null
            });
            updateDebugInfo();
        }
        
        function updateDebugInfo() {
            const pre = document.getElementById('debugInfo');
            if (pre) {
                pre.textContent = JSON.stringify(DEBUG, null, 2);
            }
        }
        
        addDebugStep('Страница загружена');
        
        // DOM элементы
        const DOM = {
            loadingSection: document.getElementById('loadingSection'),
            statusMessage: document.getElementById('statusMessage'),
            errorBox: document.getElementById('errorBox'),
            errorMessage: document.getElementById('errorMessage'),
            errorDetails: document.getElementById('errorDetails'),
            actionButtons: document.getElementById('actionButtons'),
            retryBtn: document.getElementById('retryBtn'),
            loginBtn: document.getElementById('loginBtn'),
            inventoryBtn: document.getElementById('inventoryBtn')
        };
        
        // Функция показа ошибки (НЕ ДЕЛАЕТ РЕДИРЕКТ)
        function showError(title, message, details = null) {
            console.error('[Index]', title, message, details);
            
            DOM.loadingSection.style.display = 'none';
            DOM.errorBox.classList.add('show');
            DOM.actionButtons.style.display = 'flex';
            
            DOM.errorMessage.textContent = message;
            
            let detailsText = '';
            if (details) {
                if (details instanceof Error) {
                    detailsText = `${details.name}: ${details.message}\n${details.stack || ''}`;
                } else {
                    detailsText = JSON.stringify(details, null, 2);
                }
            }
            DOM.errorDetails.textContent = detailsText || 'Нет дополнительной информации';
            
            addDebugStep('Ошибка показана', { title, message, details: detailsText });
        }
        
        function setStatus(text) {
            DOM.statusMessage.textContent = text;
            addDebugStep('Статус', text);
        }
        
        // Ручные переходы
        function goToLogin() {
            addDebugStep('Ручной переход на логин');
            window.location.href = 'pages/login.html';
        }
        
        function goToInventory() {
            addDebugStep('Ручной переход на склад');
            window.location.href = 'pages/inventory.html';
        }
        
        async function retry() {
            addDebugStep('Повторная попытка');
            DOM.errorBox.classList.remove('show');
            DOM.actionButtons.style.display = 'none';
            DOM.loadingSection.style.display = 'block';
            await initialize();
        }
        
        // Основная инициализация
        async function initialize() {
            try {
                setStatus('Импорт модуля Supabase...');
                addDebugStep('Начало импорта Supabase');
                
                // Динамический импорт с обработкой ошибок
                let supabaseModule;
                try {
                    supabaseModule = await import('./core/supabase.js');
                    addDebugStep('Модуль Supabase загружен');
                } catch (importError) {
                    addDebugStep('Ошибка импорта Supabase', importError);
                    throw new Error(`Не удалось загрузить модуль Supabase: ${importError.message}`);
                }
                
                const { supabase } = supabaseModule;
                
                if (!supabase) {
                    throw new Error('Supabase клиент не найден в модуле');
                }
                
                setStatus('Проверка конфигурации Supabase...');
                addDebugStep('Проверка конфигурации', {
                    url: supabase.supabaseUrl,
                    hasKey: !!supabase.supabaseKey
                });
                
                setStatus('Получение сессии...');
                addDebugStep('Запрос сессии');
                
                const { data: { session }, error } = await supabase.auth.getSession();
                
                if (error) {
                    addDebugStep('Ошибка получения сессии', error);
                    throw error;
                }
                
                addDebugStep('Сессия получена', { hasSession: !!session });
                
                if (session?.user) {
                    setStatus(`✅ Вход выполнен: ${session.user.email}`);
                    addDebugStep('Пользователь авторизован', { email: session.user.email });
                    
                    const returnUrl = sessionStorage.getItem('sh_auth_return_url');
                    addDebugStep('Проверка returnUrl', { returnUrl });
                    
                    setStatus('✅ Перенаправление на склад через 2 секунды...');
                    
                    // ЗАДЕРЖКА перед редиректом чтобы увидеть сообщение
                    setTimeout(() => {
                        if (returnUrl) {
                            sessionStorage.removeItem('sh_auth_return_url');
                            window.location.href = returnUrl;
                        } else {
                            window.location.href = 'pages/inventory.html';
                        }
                    }, 2000);
                    
                } else {
                    setStatus('ℹ️ Нет активной сессии');
                    addDebugStep('Сессия отсутствует');
                    
                    setStatus('Перенаправление на страницу входа через 2 секунды...');
                    
                    setTimeout(() => {
                        window.location.href = 'pages/login.html';
                    }, 2000);
                }
                
            } catch (error) {
                console.error('[Index] Ошибка инициализации:', error);
                
                let errorTitle = 'Ошибка инициализации';
                let errorMessage = error.message || 'Неизвестная ошибка';
                
                if (error.message.includes('Failed to fetch')) {
                    errorMessage = 'Не удалось загрузить модуль. Проверьте пути к файлам.';
                } else if (error.message.includes('supabaseUrl')) {
                    errorMessage = 'Ошибка конфигурации Supabase.';
                }
                
                showError(errorTitle, errorMessage, error);
            }
        }
        
        // Привязка событий
        DOM.retryBtn.addEventListener('click', retry);
        DOM.loginBtn.addEventListener('click', goToLogin);
        DOM.inventoryBtn.addEventListener('click', goToInventory);
        
        // Запуск
        initialize();
        
        // Обновляем отладку каждую секунду (на случай зависания)
        setInterval(updateDebugInfo, 1000);
    </script>
</body>
</html>
