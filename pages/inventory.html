<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Склад | SH CRM</title>
    
    <!-- Базовый путь для GitHub Pages -->
    <base href="/second-hand-crm/">
    
    <!-- Основные стили -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/layouts/inventory.css">
    
    <style>
        /* Стили только для этой страницы (переопределения) */
        .inventory-page {
            display: flex;
            flex-direction: column;
            height: 100%;
            min-height: 0;
            background: var(--color-bg);
        }
        
        /* Офлайн-баннер */
        .offline-banner {
            display: none;
            align-items: center;
            justify-content: space-between;
            padding: var(--spacing-3) var(--spacing-4);
            margin-bottom: var(--spacing-4);
            background: var(--color-warning-bg);
            border-radius: var(--radius-md);
            border-left: 3px solid var(--color-warning);
        }
        
        .offline-banner .message {
            flex: 1;
            font-size: var(--font-size-sm);
            color: var(--color-warning-dark);
            font-weight: var(--font-weight-medium);
        }
        
        .offline-banner .btn-ghost {
            padding: var(--spacing-1) var(--spacing-3);
            font-size: var(--font-size-xs);
            background: transparent;
            border: var(--border-width) solid var(--color-warning);
            color: var(--color-warning-dark);
            border-radius: var(--radius-md);
            cursor: pointer;
            margin-left: var(--spacing-3);
        }
        
        .offline-banner .btn-ghost:hover {
            background: var(--color-warning);
            color: var(--color-white);
        }
        
        .error-banner {
            display: none;
            align-items: center;
            justify-content: space-between;
            padding: var(--spacing-3) var(--spacing-4);
            margin-bottom: var(--spacing-4);
            background: var(--color-danger-bg);
            border-radius: var(--radius-md);
            border-left: 3px solid var(--color-danger);
        }
        
        .error-banner-success {
            background: var(--color-success-bg);
            border-left-color: var(--color-success);
        }
        
        .error-banner-warning {
            background: var(--color-warning-bg);
            border-left-color: var(--color-warning);
        }
        
        .error-banner-info {
            background: var(--color-info-bg);
            border-left-color: var(--color-info);
        }
        
        .error-banner .message {
            flex: 1;
            font-size: var(--font-size-sm);
            color: var(--color-text);
        }
        
        .error-banner .close-btn {
            background: transparent;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: var(--color-text-muted);
        }
        
        .empty-state {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-16);
            text-align: center;
            color: var(--color-text-muted);
            background: var(--color-white);
            border-radius: var(--radius-lg);
            border: var(--border-width) dashed var(--color-border);
        }
        
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: var(--spacing-4);
            opacity: 0.5;
        }
        
        .skeleton-rows {
            display: none;
            padding: var(--spacing-4);
            background: var(--color-white);
            border-radius: var(--radius-lg);
        }
        
        .skeleton-row {
            display: flex;
            align-items: center;
            gap: var(--spacing-3);
            padding: var(--spacing-3) 0;
            border-bottom: var(--border-width) solid var(--color-border-light);
        }
        
        .skeleton {
            background: var(--color-gray-200);
            border-radius: var(--radius-sm);
            animation: skeleton-pulse 1.5s ease-in-out infinite;
        }
        
        .skeleton-checkbox { width: 20px; height: 20px; }
        .skeleton-image { width: 48px; height: 48px; border-radius: var(--radius-md); }
        .skeleton-text { flex: 1; height: 16px; border-radius: var(--radius-full); }
        .skeleton-badge { width: 80px; height: 24px; border-radius: var(--radius-full); }
        .skeleton-actions { width: 60px; height: 32px; border-radius: var(--radius-md); }
        
        @keyframes skeleton-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* Модальное окно добавления товара (базовый контейнер) */
        #modalContainer {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: var(--z-modal);
        }
        
        #modalContainer > * {
            pointer-events: auto;
        }
        
        /* Индикатор загрузки модуля */
        .module-loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 400px;
            gap: var(--spacing-4);
        }
        
        .module-loading .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--color-border);
            border-top-color: var(--color-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            .skeleton-row {
                gap: var(--spacing-2);
            }
            
            .offline-banner {
                flex-wrap: wrap;
            }
            
            .offline-banner .btn-ghost {
                margin-left: 0;
                margin-top: var(--spacing-2);
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Шапка приложения -->
        <header class="app-header">
            <h1>📦 SH CRM</h1>
            <nav class="app-nav" aria-label="Основная навигация">
                <a href="pages/inventory.html" class="active" aria-current="page">Склад</a>
                <a href="pages/cashier.html">Касса</a>
                <a href="pages/reports.html">Отчеты</a>
            </nav>
            <div class="header-actions">
                <span class="user-email" id="userEmail"></span>
                <button class="btn-ghost btn-sm" id="logoutBtn" aria-label="Выйти из системы">
                    🚪 Выход
                </button>
            </div>
        </header>
        
        <!-- Основной контент -->
        <main class="app-main">
            <div class="inventory-page">
                <!-- Офлайн-баннер -->
                <div class="offline-banner" id="offlineBanner">
                    <span class="message">⚠️ Нет подключения к интернету. Работа в офлайн-режиме.</span>
                    <button class="btn-ghost" id="offlineRetryBtn">Повторить подключение</button>
                </div>
                
                <!-- Баннер ошибок -->
                <div class="error-banner" id="errorBanner">
                    <span class="message" id="errorMessage"></span>
                    <button class="close-btn" id="closeErrorBtn">×</button>
                </div>
                
                <!-- Панель фильтров -->
                <div class="filters-panel">
                    <div class="search-wrapper">
                        <input type="text" id="searchInput" class="search-input" placeholder="Поиск по названию или ID...">
                    </div>
                    
                    <select id="statusFilter" class="filter-select">
                        <option value="">Все статусы</option>
                        <option value="in_stock">В наличии</option>
                        <option value="sold">Продан</option>
                        <option value="reserved">Забронирован</option>
                    </select>
                    
                    <select id="categoryFilter" class="filter-select">
                        <option value="">Все категории</option>
                    </select>
                    
                    <select id="sortSelect" class="filter-select">
                        <option value="created_at-desc">Новые сначала</option>
                        <option value="price-asc">Цена: по возрастанию</option>
                        <option value="price-desc">Цена: по убыванию</option>
                        <option value="name-asc">Название: А-Я</option>
                    </select>
                    
                    <div class="header-right">
                        <button class="btn-primary" id="addProductBtn">+ Добавить товар</button>
                        <button class="btn-secondary" id="refreshBtn">🔄</button>
                    </div>
                </div>
                
                <!-- Панель статистики -->
                <div class="inventory-stats" id="statsBar">
                    <!-- Заполняется динамически -->
                </div>
                
                <!-- Таблица товаров -->
                <div class="products-table-wrapper">
                    <!-- Индикатор загрузки модуля -->
                    <div id="moduleLoading" class="module-loading">
                        <div class="spinner"></div>
                        <p>Загрузка модуля...</p>
                    </div>
                    
                    <!-- Скелетон-лоадер (скрыт изначально) -->
                    <div class="skeleton-rows" id="skeletonLoader" style="display: none;">
                        <div class="skeleton-row">
                            <div class="skeleton skeleton-checkbox"></div>
                            <div class="skeleton skeleton-image"></div>
                            <div class="skeleton skeleton-text"></div>
                            <div class="skeleton skeleton-badge"></div>
                            <div class="skeleton skeleton-actions"></div>
                        </div>
                        <div class="skeleton-row">
                            <div class="skeleton skeleton-checkbox"></div>
                            <div class="skeleton skeleton-image"></div>
                            <div class="skeleton skeleton-text"></div>
                            <div class="skeleton skeleton-badge"></div>
                            <div class="skeleton skeleton-actions"></div>
                        </div>
                        <div class="skeleton-row">
                            <div class="skeleton skeleton-checkbox"></div>
                            <div class="skeleton skeleton-image"></div>
                            <div class="skeleton skeleton-text"></div>
                            <div class="skeleton skeleton-badge"></div>
                            <div class="skeleton skeleton-actions"></div>
                        </div>
                    </div>
                    
                    <!-- Пустое состояние (скрыто изначально) -->
                    <div class="empty-state" id="emptyState" style="display: none;">
                        <div class="empty-state-icon">📦</div>
                        <p class="empty-state-title">Нет товаров</p>
                        <p class="empty-state-message">Нажмите "Добавить товар" чтобы начать</p>
                    </div>
                    
                    <!-- Таблица -->
                    <table class="products-table" id="productsTable" style="display: none;">
                        <thead>
                            <tr>
                                <th width="40">
                                    <input type="checkbox" id="selectAllCheckbox">
                                </th>
                                <th>Фото</th>
                                <th>Название</th>
                                <th>Категория</th>
                                <th>Цена</th>
                                <th>Статус</th>
                                <th width="80">Действия</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <!-- Заполняется динамически -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    
    <!-- Контейнер для модальных окон -->
    <div id="modalContainer"></div>
    
    <!-- Контейнер для уведомлений -->
    <div id="notificationContainer"></div>
    
    <!-- Основной скрипт страницы -->
    <script type="module" src="js/inventory.js"></script>
    
    <!-- Fallback на случай ошибки -->
    <script>
        (function() {
            const moduleLoading = document.getElementById('moduleLoading');
            const skeletonLoader = document.getElementById('skeletonLoader');
            const productsTable = document.getElementById('productsTable');
            const emptyState = document.getElementById('emptyState');
            const errorBanner = document.getElementById('errorBanner');
            const errorMessage = document.getElementById('errorMessage');
            
            let moduleLoaded = false;
            let timeoutId = null;
            
            // Функция для отображения ошибки
            function showModuleError(message) {
                if (moduleLoading) moduleLoading.style.display = 'none';
                if (skeletonLoader) skeletonLoader.style.display = 'none';
                if (productsTable) productsTable.style.display = 'none';
                
                if (errorBanner && errorMessage) {
                    errorMessage.textContent = message;
                    errorBanner.style.display = 'flex';
                    errorBanner.className = 'error-banner error-banner-error';
                }
                
                if (emptyState) {
                    emptyState.style.display = 'flex';
                    const title = emptyState.querySelector('.empty-state-title');
                    const msg = emptyState.querySelector('.empty-state-message');
                    if (title) title.textContent = 'Ошибка загрузки';
                    if (msg) msg.textContent = message;
                }
            }
            
            // Проверяем, загружен ли уже модуль
            window.__inventoryModuleLoaded = false;
            
            // Таймаут для проверки загрузки модуля (увеличен до 10 секунд)
            timeoutId = setTimeout(function() {
                if (!window.__inventoryModuleLoaded) {
                    console.warn('[Inventory] Module load timeout');
                    showModuleError('Превышено время ожидания. Проверьте подключение к интернету.');
                }
            }, 10000);
            
            // Слушаем успешную загрузку модуля
            window.addEventListener('load', function() {
                // Даём модулю время на инициализацию
                setTimeout(function() {
                    if (!window.__inventoryModuleLoaded) {
                        // Проверяем, есть ли контент в таблице
                        const tableBody = document.getElementById('tableBody');
                        if (tableBody && tableBody.children.length > 0) {
                            window.__inventoryModuleLoaded = true;
                            clearTimeout(timeoutId);
                            if (moduleLoading) moduleLoading.style.display = 'none';
                        }
                    }
                }, 1000);
            });
            
            // Обработчик ошибки загрузки скрипта
            window.addEventListener('error', function(e) {
                if (e.target && e.target.tagName === 'SCRIPT' && e.target.src && e.target.src.includes('inventory.js')) {
                    console.error('[Inventory] Script load error:', e);
                    clearTimeout(timeoutId);
                    window.__inventoryModuleLoaded = false;
                    showModuleError('Не удалось загрузить модуль страницы. Проверьте подключение.');
                }
            }, true);
            
            // Экспортируем функцию для отметки загрузки модуля
            window.markInventoryModuleLoaded = function() {
                if (!window.__inventoryModuleLoaded) {
                    window.__inventoryModuleLoaded = true;
                    clearTimeout(timeoutId);
                    if (moduleLoading) moduleLoading.style.display = 'none';
                    console.log('[Inventory] Module loaded successfully');
                }
            };
            
            // Обработчик кнопки повтора
            document.addEventListener('click', function(e) {
                if (e.target.id === 'offlineRetryBtn' || e.target.closest('#offlineRetryBtn')) {
                    location.reload();
                }
            });
        })();
    </script>
</body>
</html>
