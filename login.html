<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | SH CRM</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #f1f5f9;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 6px -2px rgba(0,0,0,0.05);
        }
        .login-card h2 {
            margin-bottom: 24px;
            text-align: center;
        }
        .error-message {
            color: #dc2626;
            font-size: 14px;
            margin-top: 8px;
            display: none;
        }
        .btn-block {
            width: 100%;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <h2>SH CRM</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" class="form-control" placeholder="user@example.com" required>
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                <div class="error-message" id="errorMessage"></div>
                <button type="submit" class="btn-primary btn-block" id="submitBtn">Войти</button>
            </form>
        </div>
    </div>
    
    <script type="module">
        import { supabase } from './core/supabase.js';
        import { checkAuth } from './core/auth.js';
        
        // Если уже авторизован — на склад
        const user = await checkAuth();
        if (user) {
            window.location.href = 'inventory.html';
        }
        
        const form = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const errorEl = document.getElementById('errorMessage');
        const submitBtn = document.getElementById('submitBtn');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            
            if (!email || !password) {
                errorEl.textContent = 'Введите email и пароль';
                errorEl.style.display = 'block';
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Вход...';
            errorEl.style.display = 'none';
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email,
                    password
                });
                
                if (error) {
                    if (error.message.includes('Invalid login')) {
                        throw new Error('Неверный email или пароль');
                    }
                    throw error;
                }
                
                if (data.user) {
                    window.location.href = 'inventory.html';
                }
            } catch (error) {
                errorEl.textContent = error.message;
                errorEl.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Войти';
            }
        });
    </script>
</body>
</html>
